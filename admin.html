<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin — Adox Foods</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        body {
            background: #f0f2f5;
        }
        /* Login screen */
        
        .login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--secondary), #1a2a3a);
            padding: 2rem;
        }
        
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 3rem 2.5rem;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.3);
        }
        
        .login-card .logo-big {
            font-size: 2rem;
            font-weight: 900;
            color: var(--secondary);
            margin-bottom: 0.5rem;
        }
        
        .login-card .logo-big span {
            color: var(--primary);
        }
        
        .login-card p {
            color: var(--gray-600);
            font-size: 0.88rem;
            margin-bottom: 2rem;
        }
        
        .login-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 14px;
            border-radius: 10px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            transition: var(--transition);
            margin-top: 0.5rem;
        }
        
        .login-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }
        /* Admin layout */
        
        .admin-layout {
            display: none;
            min-height: 100vh;
        }
        
        .admin-layout.visible {
            display: block;
        }
        
        .admin-nav {
            background: var(--secondary);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .admin-nav .logo {
            color: white;
            font-size: 1.3rem;
            font-weight: 800;
        }
        
        .admin-nav .logo span {
            color: var(--primary);
        }
        
        .admin-badge {
            background: var(--primary);
            color: white;
            font-size: 0.72rem;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 50px;
        }
        
        .logout-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 0.82rem;
            transition: var(--transition);
        }
        
        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .admin-body {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        /* Tabs */
        
        .admin-tabs {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        
        .admin-tab {
            padding: 10px 24px;
            border-radius: 50px;
            font-size: 0.88rem;
            font-weight: 600;
            border: 2px solid var(--gray-200);
            background: white;
            color: var(--gray-600);
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Poppins', sans-serif;
        }
        
        .admin-tab.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }
        /* Stats */
        
        .admin-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: white;
            border-radius: 14px;
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-100);
        }
        
        .stat-card .sc-num {
            font-size: 2rem;
            font-weight: 900;
            color: var(--primary);
        }
        
        .stat-card .sc-label {
            font-size: 0.78rem;
            color: var(--gray-400);
            font-weight: 500;
            margin-top: 4px;
        }
        /* Section */
        
        .admin-section {
            display: none;
        }
        
        .admin-section.active {
            display: block;
        }
        /* Review link generator */
        
        .link-gen-card {
            background: white;
            border-radius: 14px;
            padding: 2rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-100);
            margin-bottom: 2rem;
        }
        
        .link-gen-card h3 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--secondary);
            margin-bottom: 1rem;
        }
        
        .link-gen-row {
            display: flex;
            gap: 0.75rem;
        }
        
        .link-gen-row input {
            flex: 1;
        }
        
        .gen-btn {
            background: var(--primary);
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            white-space: nowrap;
            transition: var(--transition);
        }
        
        .gen-btn:hover {
            background: var(--primary-dark);
        }
        
        .generated-link {
            display: none;
            margin-top: 1rem;
            background: var(--bg);
            border-radius: 10px;
            padding: 1rem;
            font-size: 0.82rem;
            word-break: break-all;
            border: 1px solid var(--gray-200);
        }
        
        .generated-link.show {
            display: block;
        }
        
        .copy-btn {
            background: var(--secondary);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.75rem;
            font-family: 'Poppins', sans-serif;
            transition: var(--transition);
        }
        
        .copy-btn:hover {
            background: var(--primary);
        }
        /* Table */
        
        .admin-table-wrap {
            background: white;
            border-radius: 14px;
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            border: 1px solid var(--gray-100);
        }
        
        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .admin-table th {
            background: var(--secondary);
            color: white;
            padding: 1rem;
            text-align: left;
            font-size: 0.82rem;
            font-weight: 600;
        }
        
        .admin-table td {
            padding: 1rem;
            font-size: 0.85rem;
            color: var(--gray-800);
            border-bottom: 1px solid var(--gray-100);
            vertical-align: middle;
        }
        
        .admin-table tr:last-child td {
            border-bottom: none;
        }
        
        .admin-table tr:hover td {
            background: #fafafa;
        }
        /* Badges */
        
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 50px;
            font-size: 0.72rem;
            font-weight: 700;
        }
        
        .badge-pending {
            background: rgba(245, 158, 11, 0.1);
            color: #d97706;
        }
        
        .badge-confirmed {
            background: rgba(34, 197, 94, 0.1);
            color: #16a34a;
        }
        
        .badge-approved {
            background: rgba(34, 197, 94, 0.1);
            color: #16a34a;
        }
        
        .badge-unapproved {
            background: rgba(239, 68, 68, 0.1);
            color: #dc2626;
        }
        /* Action buttons */
        
        .action-btn {
            padding: 6px 14px;
            border-radius: 8px;
            border: none;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            transition: var(--transition);
            margin-right: 4px;
        }
        
        @media (max-width: 768px) {
            .admin-body {
                padding: 1rem;
            }
            .admin-stats {
                grid-template-columns: repeat(2, 1fr);
            }
            .admin-tabs {
                gap: 0.5rem;
            }
            .admin-tab {
                padding: 8px 14px;
                font-size: 0.78rem;
            }
            .link-gen-row {
                flex-direction: column;
            }
            .admin-table-wrap {
                overflow-x: auto;
            }
            .admin-table {
                min-width: 600px;
            }
            .admin-table th,
            .admin-table td {
                padding: 0.6rem 0.5rem;
                font-size: 0.75rem;
            }
            .admin-nav {
                padding: 1rem;
            }
            .admin-nav .logo {
                font-size: 1.1rem;
            }
            .login-card {
                padding: 2rem 1.5rem;
            }
        }
        
        @media (max-width: 480px) {
            .admin-stats {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.75rem;
            }
            .stat-card {
                padding: 1rem;
            }
            .stat-card .sc-num {
                font-size: 1.5rem;
            }
        }
        
        .action-btn.approve {
            background: rgba(34, 197, 94, 0.1);
            color: #16a34a;
        }
        
        .action-btn.approve:hover {
            background: #16a34a;
            color: white;
        }
        
        .action-btn.delete {
            background: rgba(239, 68, 68, 0.1);
            color: #dc2626;
        }
        
        .action-btn.delete:hover {
            background: #dc2626;
            color: white;
        }
        /* Stars small */
        
        .stars-sm {
            color: #f59e0b;
            font-size: 0.85rem;
        }
        /* Loading */
        
        .table-loading {
            text-align: center;
            padding: 3rem;
            color: var(--gray-400);
        }
        
        @media (max-width: 768px) {
            .admin-body {
                padding: 1rem;
            }
            .link-gen-row {
                flex-direction: column;
            }
            .admin-table {
                font-size: 0.78rem;
            }
            .admin-table th,
            .admin-table td {
                padding: 0.75rem 0.5rem;
            }
        }
    </style>
</head>

<body>

    <!-- LOGIN SCREEN -->
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <div class="logo-big">Adox<span>Foods</span></div>
            <p>Admin Panel — Enter your password to continue</p>
            <div class="form-group">
                <input type="password" id="adminPassword" class="form-input" placeholder="Enter admin password" />
            </div>
            <button class="login-btn" onclick="handleLogin()">🔐 Login</button>
        </div>
    </div>

    <!-- ADMIN LAYOUT -->
    <div class="admin-layout" id="adminLayout">

        <div class="admin-nav">
            <div style="display:flex;align-items:center;gap:1rem">
                <div class="logo">Adox<span>Foods</span></div>
                <span class="admin-badge">Admin Panel</span>
            </div>
            <button class="logout-btn" onclick="handleLogout()">🚪 Logout</button>
        </div>

        <div class="admin-body">

            <!-- Stats -->
            <div class="admin-stats">
                <div class="stat-card">
                    <div class="sc-num" id="stat-orders">—</div>
                    <div class="sc-label">Total Orders</div>
                </div>
                <div class="stat-card">
                    <div class="sc-num" id="stat-reviews">—</div>
                    <div class="sc-label">Total Reviews</div>
                </div>
                <div class="stat-card">
                    <div class="sc-num" id="stat-pending">—</div>
                    <div class="sc-label">Pending Approval</div>
                </div>
                <div class="stat-card">
                    <div class="sc-num" id="stat-revenue">—</div>
                    <div class="sc-label">Total Revenue</div>
                </div>
            </div>

            <!-- Tabs -->
            <div class="admin-tabs">
                <button class="admin-tab active" onclick="switchTab('orders')">📦 Orders</button>
                <button class="admin-tab" onclick="switchTab('reviews')">⭐ Reviews</button>
            </div>

            <!-- ORDERS SECTION -->
            <div class="admin-section active" id="section-orders">
                <div class="admin-table-wrap">
                    <div id="orders-table" class="table-loading">Loading orders...</div>
                </div>
            </div>

            <!-- REVIEWS SECTION -->
            <div class="admin-section" id="section-reviews">

                <!-- Generate review link -->
                <div class="link-gen-card">
                    <h3>🔗 Generate Review Link</h3>
                    <div class="link-gen-row">
                        <input type="text" class="form-input" id="linkOrderId" placeholder="Enter Order ID e.g. ADX-2026-K7X9M2" />
                        <button class="gen-btn" onclick="generateLink()">Generate Link</button>
                    </div>
                    <div class="generated-link" id="generatedLink">
                        <strong>Review Link:</strong><br/>
                        <span id="linkText"></span><br/>
                        <button class="copy-btn" onclick="copyLink()">📋 Copy Link</button>
                    </div>
                </div>

                <div class="admin-table-wrap">
                    <div id="reviews-table" class="table-loading">Loading reviews...</div>
                </div>
            </div>

        </div>
    </div>

    <script>
        let adminPassword = '';
        const SUPABASE_URL = 'https://iebgvxdkhxabvpmprhfi.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllYmd2eGRraHhhYnZwbXByaGZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NzA1NjAsImV4cCI6MjA5MDU0NjU2MH0.UwxSil8P2YpZMlqAhXEacRiQMT5ueC-e856nNgjagIU';

        // Enter key on password
        const pwdInput = document.getElementById('adminPassword');
        if (pwdInput) pwdInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') handleLogin();
        });

        async function handleLogin() {
            const pwd = document.getElementById('adminPassword').value;
            if (!pwd) {
                alert('Please enter password');
                return;
            }

            try {
                const res = await fetch('/api/delete-review', {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        id: 'check-auth-only',
                        admin_password: pwd
                    })
                });
                console.log('Status:', res.status);
                const data = await res.json();
                console.log('Data:', data);

                if (res.status === 401) {
                    alert('❌ Wrong password!');
                    return;
                }

                adminPassword = pwd;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminLayout').classList.add('visible');
                loadAll();

            } catch (err) {
                console.log('Error:', err);
                alert('Error: ' + err.message);
            }
        }

        function handleLogout() {
            adminPassword = '';
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('adminLayout').classList.remove('visible');
            document.getElementById('adminPassword').value = '';
        }

        function switchTab(tab) {
            document.querySelectorAll('.admin-tab').forEach((t, i) => t.classList.toggle('active', ['orders', 'reviews'][i] === tab));
            document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
            document.getElementById(`section-${tab}`).classList.add('active');
        }

        // Supabase fetch helper
        async function sbFetch(table, query = '') {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}${query}`, {
                headers: {
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                    'Content-Type': 'application/json'
                }
            });
            return res.json();
        }

        async function loadAll() {
            loadOrders();
            loadReviews();
        }

        async function loadOrders() {
            const container = document.getElementById('orders-table');
            try {
                const orders = await sbFetch('orders', '?order=created_at.desc');
                document.getElementById('stat-orders').textContent = orders.length;
                const revenue = orders.reduce((s, o) => s + (o.total || 0), 0);
                document.getElementById('stat-revenue').textContent = '₦' + revenue.toLocaleString();

                if (orders.length === 0) {
                    container.innerHTML = '<div class="table-loading">No orders yet</div>';
                    return;
                }

                container.innerHTML = `
        <table class="admin-table">
          <thead>
            <tr>
              <th>Order ID</th>
              <th>Customer</th>
              <th>Phone</th>
              <th>Delivery</th>
              <th>Total</th>
              <th>Status</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody>
            ${orders.map(o => `
              <tr>
                <td><strong style="color:var(--primary)">${o.order_id}</strong></td>
                <td>${o.name}</td>
                <td>${o.phone}</td>
                <td style="max-width:150px;font-size:.78rem">${o.delivery}</td>
                <td><strong>₦${o.total?.toLocaleString()}</strong></td>
                <td>
  <select onchange="updateOrderStatus('${o.id}', this.value)" style="padding:4px 8px;border-radius:6px;border:1px solid #e0e0e0;font-family:'Poppins',sans-serif;font-size:.75rem;cursor:pointer;color:var(--secondary)">
    <option value="pending" ${o.status === 'pending' ? 'selected' : ''}>⏳ Pending</option>
    <option value="confirmed" ${o.status === 'confirmed' ? 'selected' : ''}>✅ Confirmed</option>
    <option value="delivered" ${o.status === 'delivered' ? 'selected' : ''}>📦 Delivered</option>
    <option value="cancelled" ${o.status === 'cancelled' ? 'selected' : ''}>❌ Cancelled</option>
  </select>
</td>
                <td style="font-size:.75rem">${new Date(o.created_at).toLocaleDateString('en-NG')}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    } catch (err) {
      container.innerHTML = '<div class="table-loading">Error loading orders</div>';
    }
  }
  async function updateOrderStatus(id, status) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/orders?id=eq.${id}`, {
    method: 'PATCH',
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify({ status: status })
  });
  if (res.ok) {
    showToast('✅ Order status updated!');
  } else {
    alert('Error updating status');
  }
}

  async function loadReviews() {
    const container = document.getElementById('reviews-table');
    try {
      const reviews = await sbFetch('reviews', '?order=created_at.desc');
      document.getElementById('stat-reviews').textContent = reviews.length;
      document.getElementById('stat-pending').textContent = reviews.filter(r => !r.is_approved && r.token_used).length;

      if (reviews.length === 0) {
        container.innerHTML = '<div class="table-loading">No reviews yet</div>';
        return;
      }

      container.innerHTML = `
        <table class="admin-table">
          <thead>
            <tr>
              <th>Customer</th>
              <th>Order ID</th>
              <th>Rating</th>
              <th>Review</th>
              <th>Status</th>
              <th>Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${reviews.map(r => `
              <tr id="review-row-${r.id}">
                <td><strong>${r.customer_name || '—'}</strong></td>
                <td style="color:var(--primary);font-size:.8rem">${r.order_id}</td>
                <td class="stars-sm">${r.rating ? '★'.repeat(r.rating) + '☆'.repeat(5 - r.rating) : '—'}</td>
                <td style="max-width:200px;font-size:.8rem">${r.review_text || '<em style="color:var(--gray-400)">Not submitted yet</em>'}</td>
                <td><span class="badge ${r.is_approved ? 'badge-approved' : 'badge-unapproved'}">${r.is_approved ? 'Approved' : r.token_used ? 'Pending' : 'Not submitted'}</span></td>
                <td style="font-size:.75rem">${new Date(r.created_at).toLocaleDateString('en-NG')}</td>
                <td>
                  ${r.token_used && !r.is_approved ? `<button class="action-btn approve" onclick="approveReview('${r.id}')">✅ Approve</button>` : ''}
                  ${r.review_text ? `<button class="action-btn delete" onclick="deleteReview('${r.id}')">🗑 Delete</button>` : ''}
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    } catch (err) {
      container.innerHTML = '<div class="table-loading">Error loading reviews</div>';
    }
  }

  async function approveReview(id) {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/reviews?id=eq.${id}`, {
        method: 'PATCH',
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ is_approved: true })
      });
      if (res.ok) { alert('✅ Review approved!'); loadReviews(); }
      else alert('Error approving review');
    } catch (err) { alert('Error: ' + err.message); }
  }

  async function deleteReview(id) {
    if (!confirm('Are you sure you want to delete this review?')) return;
    try {
      const res = await fetch('/api/delete-review', {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, admin_password: adminPassword })
      });
      const data = await res.json();
      if (data.success) { alert('🗑 Review deleted!'); loadReviews(); }
      else alert('Error: ' + data.error);
    } catch (err) { alert('Error: ' + err.message); }
  }

  async function generateLink() {
    const orderId = document.getElementById('linkOrderId').value.trim();
    if (!orderId) { alert('Please enter an Order ID'); return; }
    try {
      const res = await fetch('/api/generate-review-link', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ order_id: orderId })
      });
      const data = await res.json();
      if (data.success) {
        document.getElementById('linkText').textContent = data.link;
        document.getElementById('generatedLink').classList.add('show');
      } else { alert('Error: ' + data.error); }
    } catch (err) { alert('Error: ' + err.message); }
  }

  function copyLink() {
    const link = document.getElementById('linkText').textContent;
    navigator.clipboard.writeText(link);
    alert('✅ Link copied to clipboard!');
  }
    </script>
</body>

</html>
